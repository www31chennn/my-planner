<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="計畫本" />
  <title>計畫本</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body, #root { height: 100%; }
    body { background: #F7F5F2; overscroll-behavior: none; font-family: 'Noto Sans TC', sans-serif; }
    input, textarea, button, select { font-family: inherit; }
    ::-webkit-scrollbar { display: none; }
    .swipe-container { display: flex; width: 300%; height: 100%; transition: transform 0.38s cubic-bezier(0.4,0,0.2,1); will-change: transform; }
    .swipe-panel { width: 33.333%; height: 100%; overflow-y: auto; flex-shrink: 0; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes popIn { from { opacity:0; transform:scale(0.88); } to { opacity:1; transform:scale(1); } }
    .fade-up { animation: fadeUp 0.3s ease forwards; }
    .fade-in { animation: fadeIn 0.4s ease forwards; }
    .pop-in { animation: popIn 0.18s ease forwards; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const API = "/.netlify/functions/api";

// 密碼加密：用 SHA-256 hash，存的是 hash 值而非明文
async function hashPassword(password) {
  const msgBuffer = new TextEncoder().encode(password);
  const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b => b.toString(16).padStart(2,'0')).join('');
}

// 所有 API 呼叫用 POST + JSON body
async function apiPost(payload) {
  try {
    // Google Apps Script 不支援跨域 POST body，改用 GET + no-cors workaround
    // 直接用 GET，但把 data 用 encodeURIComponent 包好
    const qs = Object.entries(payload)
      .map(([k,v]) => `${encodeURIComponent(k)}=${encodeURIComponent(typeof v === 'string' ? v : JSON.stringify(v))}`)
      .join("&");
    const res = await fetch(`${API}?${qs}`);
    const text = await res.text();
    try { return JSON.parse(text); } catch { return { raw: text }; }
  } catch(e) {
    console.error("apiPost error:", e);
    return null;
  }
}

// 讀取 sheet
async function readSheet(user, sheetKey) {
  const res = await apiPost({ action:"read", user, sheet: sheetKey });
  return Array.isArray(res) ? res : [];
}

// 寫入 sheet - 把資料序列化成單一 JSON 字串存在第一格
async function writeSheetJson(user, sheetKey, jsonData) {
  if (jsonData === undefined || jsonData === null) {
    console.warn(`writeSheetJson: jsonData is ${jsonData} for ${sheetKey}, skipping`);
    return;
  }
  const serialized = JSON.stringify(jsonData);
  console.log(`writeSheet ${sheetKey}:`, serialized.slice(0,100));
  const res = await apiPost({ action:"write", user, sheet: sheetKey, data: JSON.stringify([["data", serialized]]) });
  console.log(`writeSheet ${sheetKey} response:`, res);
  return res;
}

// 讀取單格 JSON
async function readSheetJson(user, sheetKey) {
  const rows = await readSheet(user, sheetKey);
  if (!rows || rows.length === 0) return null;
  try {
    // 第一行第二格是 JSON 資料
    const val = rows[0][1];
    if (!val) return null;
    return JSON.parse(val);
  } catch(e) {
    console.error("readSheetJson parse error:", e);
    return null;
  }
}

const MONTHS = ["1月","2月","3月","4月","5月","6月","7月","8月","9月","10月","11月","12月"];
const DAYS_IN_MONTH = (m,y) => new Date(y,m,0).getDate();
const FIRST_DAY = (m,y) => new Date(y,m-1,1).getDay();
const DEFAULT_MOODS = ["😊","😢","😡","😴","🥰","😰","🎉","💪","🌧","☀️"];

const C = {
  bg:"#F7F5F2", card:"#FFFFFF", border:"#EBEBEB",
  text:"#1A1A1A", sub:"#9A9A9A", accent:"#4A7C59",
  accentLight:"#EAF2EC", red:"#D0533A",
};

// ── Cover ─────────────────────────────────────────────────
function CoverPage({ onLogin }) {
  const [username, setUsername] = useState("");
  const [password, setPassword] = useState("");
  const [displayName, setDisplayName] = useState("");
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");
  const [step, setStep] = useState("login");
  const [pendingCreds, setPendingCreds] = useState(null);

  async function handleEnter() {
    if (!username.trim()||!password.trim()) { setError("請填寫帳號和密碼"); return; }
    setLoading(true); setError("");
    const hashed = await hashPassword(password.trim());
    const res = await apiPost({ action:"auth", user:username.trim(), password:hashed, displayName:"__check__" });
    setLoading(false);
    if (!res) { setError("連線失敗，請稍後再試"); return; }
    if (res.isNew) {
      setPendingCreds({user:username.trim(), hashedPassword:hashed});
      setDisplayName(username.trim());
      setStep("nickname");
    } else if (res.ok===false) {
      setError(res.error||"密碼錯誤");
    } else {
      onLogin(username.trim(), hashed, res.displayName||username.trim());
    }
  }

  async function handleSetNickname() {
    if (!displayName.trim()) { setError("請輸入暱稱"); return; }
    setLoading(true); setError("");
    const res = await apiPost({ action:"updateName", user:pendingCreds.user, password:pendingCreds.hashedPassword, displayName:displayName.trim() });
    setLoading(false);
    if (res&&res.ok) { onLogin(pendingCreds.user, pendingCreds.password, displayName.trim()); }
    else { setError("建立失敗，請稍後再試"); }
  }

  const inp = { width:"100%", border:`1.5px solid ${C.border}`, borderRadius:12, padding:"13px 16px", fontSize:15, color:C.text, background:C.card, outline:"none" };
  return (
    <div className="fade-in" style={{ height:"100vh", display:"flex", alignItems:"center", justifyContent:"center", background:C.bg, padding:"0 32px" }}>
      <div style={{ width:"100%", maxWidth:360 }}>
        <div style={{ textAlign:"center", marginBottom:48 }}>
          <div style={{ fontSize:48, marginBottom:12 }}>📓</div>
          <div style={{ fontSize:28, fontFamily:"'Noto Serif TC',serif", fontWeight:700, color:C.text }}>計畫本</div>
          <div style={{ fontSize:13, color:C.sub, marginTop:6 }}>記錄你的每一天</div>
        </div>
        {step==="login" && (
          <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
            <div><div style={{ fontSize:12, color:C.sub, marginBottom:6 }}>帳號</div>
              <input value={username} onChange={e=>setUsername(e.target.value)} placeholder="輸入帳號" onKeyDown={e=>e.key==="Enter"&&handleEnter()} style={inp} /></div>
            <div><div style={{ fontSize:12, color:C.sub, marginBottom:6 }}>密碼</div>
              <input type="password" value={password} onChange={e=>setPassword(e.target.value)} placeholder="輸入密碼" onKeyDown={e=>e.key==="Enter"&&handleEnter()} style={inp} /></div>
            {error && <div style={{ fontSize:13, color:C.red, textAlign:"center" }}>{error}</div>}
            <button onClick={handleEnter} disabled={loading} style={{ width:"100%", padding:"14px 0", borderRadius:12, border:"none", background:C.accent, color:"#fff", fontSize:16, fontWeight:600, cursor:"pointer", opacity:loading?0.7:1 }}>
              {loading?"連線中…":"進入"}</button>
            <div style={{ fontSize:12, color:C.sub, textAlign:"center" }}>第一次使用會自動建立帳號</div>
          </div>
        )}
        {step==="nickname" && (
          <div className="fade-in" style={{ display:"flex", flexDirection:"column", gap:14 }}>
            <div style={{ background:C.accentLight, borderRadius:12, padding:"14px 16px", fontSize:14, color:C.accent }}>👋 帳號建立成功！請設定你的暱稱</div>
            <div><div style={{ fontSize:12, color:C.sub, marginBottom:6 }}>你的暱稱</div>
              <input value={displayName} onChange={e=>setDisplayName(e.target.value)} placeholder="例如：小美、阿明…" onKeyDown={e=>e.key==="Enter"&&handleSetNickname()} style={inp} /></div>
            {error && <div style={{ fontSize:13, color:C.red, textAlign:"center" }}>{error}</div>}
            <button onClick={handleSetNickname} disabled={loading} style={{ width:"100%", padding:"14px 0", borderRadius:12, border:"none", background:C.accent, color:"#fff", fontSize:16, fontWeight:600, cursor:"pointer", opacity:loading?0.7:1 }}>
              {loading?"建立中…":"開始使用"}</button>
          </div>
        )}
      </div>
    </div>
  );
}

function SaveDot({ saving }) {
  return (
    <div style={{ display:"flex", alignItems:"center", gap:5, fontSize:11, color:saving?C.sub:C.accent }}>
      <div style={{ width:6, height:6, borderRadius:3, background:saving?C.sub:C.accent, transition:"background 0.3s" }} />
      {saving?"儲存中":"已儲存"}
    </div>
  );
}

// ── Year Goals ─────────────────────────────────────────────
function YearGoals({ goals, setGoals, saving, year }) {
  const list = goals[year] || [];
  const done = list.filter(g=>g.done&&g.text).length;
  const total = list.filter(g=>g.text).length;

  function updateList(fn) {
    const next = fn(list);
    setGoals(p => ({ ...p, [year]: next }));
  }

  function toggle(i) {
    updateList(l => {
      const n = [...l];
      const isDone = !n[i].done;
      n[i] = { ...n[i], done:isDone, doneDate: isDone ? new Date().toLocaleDateString("zh-TW",{month:"numeric",day:"numeric"}) : "" };
      return n;
    });
  }

  return (
    <div style={{ padding:"20px 20px 120px" }}>
      <div style={{ marginBottom:20 }}>
        <div style={{ fontSize:13, color:C.sub, letterSpacing:2, marginBottom:4 }}>年度目標</div>
        <div style={{ fontSize:26, fontFamily:"'Noto Serif TC',serif", fontWeight:700, color:C.text }}>{year}</div>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginTop:10 }}>
          <div style={{ fontSize:13, color:C.sub }}>{total>0?`${done} / ${total} 完成`:"開始新增你的目標吧"}</div>
          <SaveDot saving={saving} />
        </div>
        {total>0 && (
          <div style={{ marginTop:8, height:3, background:C.border, borderRadius:2, overflow:"hidden" }}>
            <div style={{ height:"100%", width:`${(done/total)*100}%`, background:C.accent, borderRadius:2, transition:"width 0.5s" }} />
          </div>
        )}
      </div>
      <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
        {list.map((goal,i) => (
          <div key={i} className="fade-up" style={{ background:C.card, borderRadius:14, padding:"12px 14px", boxShadow:"0 1px 3px rgba(0,0,0,0.05)", opacity:goal.done?0.5:1, animationDelay:`${i*20}ms` }}>
            <div style={{ display:"flex", alignItems:"center", gap:10 }}>
              <button onClick={()=>toggle(i)} style={{ width:22, height:22, borderRadius:11, border:`2px solid ${goal.done?C.accent:C.border}`, background:goal.done?C.accent:"transparent", cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0, padding:0, transition:"all 0.2s" }}>
                {goal.done && <svg width="11" height="9" viewBox="0 0 11 9" fill="none"><path d="M1 4L4 7.5L10 1" stroke="white" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>}
              </button>
              <input style={{ flex:1, border:"none", outline:"none", fontSize:15, background:"transparent", textDecoration:goal.done?"line-through":"none", color:goal.done?C.sub:C.text, minWidth:0 }}
                placeholder={`目標 ${i+1}`} value={goal.text}
                onChange={e=>updateList(l=>{const n=[...l];n[i]={...n[i],text:e.target.value};return n;})} />
              <button onClick={()=>updateList(l=>l.filter((_,idx)=>idx!==i))} style={{ flexShrink:0, background:"none", border:"none", color:C.sub, cursor:"pointer", fontSize:18, padding:"0 2px", lineHeight:1 }}>×</button>
            </div>
            {goal.done&&goal.doneDate && (
              <div style={{ fontSize:11, color:C.accent, marginTop:5, marginLeft:32 }}>✓ 完成於 {goal.doneDate}</div>
            )}
          </div>
        ))}
        <button onClick={()=>updateList(l=>[...l,{text:"",done:false,doneDate:""}])}
          style={{ display:"flex", alignItems:"center", justifyContent:"center", gap:8, background:"none", border:`1.5px dashed ${C.border}`, borderRadius:14, padding:"13px 0", cursor:"pointer", color:C.sub, fontSize:14 }}>
          <span style={{ fontSize:20, lineHeight:1 }}>+</span> 新增目標
        </button>
      </div>
    </div>
  );
}

// ── Month Planner ──────────────────────────────────────────
function MoodPicker({ day, currentMood, onSelect, onClear, onClose }) {
  const [custom, setCustom] = useState("");
  // Render as overlay at document body level using a portal div
  useEffect(()=>{
    function handle(e) {
      // Close if clicking the backdrop
      if (e.target.id === "mood-backdrop") onClose();
    }
    document.addEventListener("mousedown",handle);
    return ()=>document.removeEventListener("mousedown",handle);
  },[]);

  return ReactDOM.createPortal(
    <div id="mood-backdrop" style={{ position:"fixed", inset:0, zIndex:999, display:"flex", alignItems:"center", justifyContent:"center", background:"rgba(0,0,0,0.15)" }}>
      <div className="pop-in" style={{ background:C.card, borderRadius:16, padding:16, boxShadow:"0 8px 40px rgba(0,0,0,0.2)", width:220, margin:20 }}>
        <div style={{ fontSize:11, color:C.sub, marginBottom:8, textAlign:"center" }}>{day} 日的心情</div>
        <div style={{ display:"flex", flexWrap:"wrap", gap:5, marginBottom:10 }}>
          {DEFAULT_MOODS.map(m=>(
            <button key={m} onClick={()=>onSelect(m)} style={{ fontSize:21, background:currentMood===m?C.accentLight:"none", border:currentMood===m?`1.5px solid ${C.accent}`:"1.5px solid transparent", borderRadius:8, padding:3, cursor:"pointer" }}>{m}</button>
          ))}
        </div>
        <div style={{ display:"flex", gap:6, marginBottom:currentMood?8:0 }}>
          <input value={custom} onChange={e=>setCustom(e.target.value)} placeholder="自訂符號…" maxLength={2}
            style={{ flex:1, border:`1.5px solid ${C.border}`, borderRadius:8, padding:"6px 8px", fontSize:14, outline:"none", color:C.text, background:C.bg, minWidth:0 }} />
          <button onClick={()=>{if(custom.trim()){onSelect(custom.trim());setCustom("");}}}
            style={{ background:C.accent, color:"#fff", border:"none", borderRadius:8, padding:"6px 10px", cursor:"pointer", fontSize:13, fontWeight:600, flexShrink:0 }}>選</button>
        </div>
        {currentMood && <button onClick={onClear} style={{ width:"100%", fontSize:12, color:C.red, background:"none", border:`1px solid ${C.red}`, borderRadius:8, padding:"5px 0", cursor:"pointer" }}>清除心情</button>}
      </div>
    </div>,
    document.body
  );
}

function MonthPlanner({ monthData, updateMonth, saving, year }) {
  const [selected, setSelected] = useState(null);
  const [moodPickerDay, setMoodPickerDay] = useState(null);
  const yearData = monthData[year] || {};

  if (selected!==null) {
    const m=selected, mData=yearData[m]||{}, mode=mData.mode||"plan", marked=mData.marked||{};
    return (
      <div style={{ padding:"20px 20px 120px" }}>
        <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:20 }}>
          <button onClick={()=>{setSelected(null);setMoodPickerDay(null);}} style={{ width:32, height:32, borderRadius:16, background:C.border, border:"none", cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center" }}>
            <svg width="8" height="13" viewBox="0 0 8 13" fill="none"><path d="M7 1L1 6.5L7 12" stroke={C.text} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>
          </button>
          <div style={{ flex:1 }}>
            <div style={{ fontSize:13, color:C.sub }}>{year}</div>
            <div style={{ fontSize:22, fontFamily:"'Noto Serif TC',serif", fontWeight:700, color:C.text }}>{MONTHS[m-1]}</div>
          </div>
          <SaveDot saving={saving} />
        </div>
        <div style={{ display:"flex", background:C.border, borderRadius:10, padding:3, marginBottom:20 }}>
          {[["plan","📋 計畫"],["calendar","📅 日曆"]].map(([k,l])=>(
            <button key={k} onClick={()=>updateMonth(m,{...mData,mode:k})} style={{ flex:1, padding:"8px 0", borderRadius:8, border:"none", cursor:"pointer", fontSize:13, fontWeight:mode===k?600:400, color:mode===k?C.text:C.sub, background:mode===k?C.card:"transparent", transition:"all 0.2s" }}>{l}</button>
          ))}
        </div>
        {mode==="plan" ? (
          <div>
            <textarea style={{ width:"100%", minHeight:220, border:`1.5px solid ${C.border}`, borderRadius:14, padding:16, fontSize:15, lineHeight:1.7, color:C.text, background:C.card, resize:"none", outline:"none" }}
              placeholder={`記錄 ${MONTHS[m-1]} 的計畫…`} value={mData.plan||""} onChange={e=>updateMonth(m,{...mData,plan:e.target.value})} />
            {mData.plan&&<button onClick={()=>updateMonth(m,{...mData,plan:""})} style={{ marginTop:10, background:"none", border:`1px solid ${C.red}`, color:C.red, borderRadius:8, padding:"7px 14px", cursor:"pointer", fontSize:13 }}>清除</button>}
          </div>
        ):(
          <div style={{ background:C.card, borderRadius:16, padding:16, boxShadow:"0 1px 3px rgba(0,0,0,0.05)" }}>
            <div style={{ fontSize:11, color:C.sub, textAlign:"center", marginBottom:10 }}>點擊日期選擇心情或自訂符號</div>
            <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", gap:2, marginBottom:8 }}>
              {["日","一","二","三","四","五","六"].map(d=><div key={d} style={{ textAlign:"center", fontSize:11, color:C.sub, fontWeight:500, padding:"4px 0" }}>{d}</div>)}
            </div>
            <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", gap:4 }}>
              {Array(FIRST_DAY(m,year)).fill(null).map((_,i)=><div key={"e"+i} />)}
              {Array(DAYS_IN_MONTH(m,year)).fill(null).map((_,i)=>{
                const day=i+1, mood=marked[day], isOpen=moodPickerDay===day;
                const setMood=(mo)=>{updateMonth(m,{...mData,marked:{...marked,[day]:mo}});setMoodPickerDay(null);};
                const clearMood=()=>{const nm={...marked};delete nm[day];updateMonth(m,{...mData,marked:nm});setMoodPickerDay(null);};
                return (
                  <div key={day}>
                    <button onClick={()=>setMoodPickerDay(isOpen?null:day)}
                      style={{ width:"100%", aspectRatio:"1", borderRadius:10, border:`1.5px solid ${mood?C.accent+"40":C.border}`, background:mood?C.accentLight:C.bg, cursor:"pointer", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:1, padding:2, transition:"all 0.15s" }}>
                      <span style={{ color:C.sub, fontSize:10 }}>{day}</span>
                      {mood&&<span style={{ fontSize:13, lineHeight:1 }}>{mood}</span>}
                    </button>
                    {isOpen&&<MoodPicker day={day} currentMood={mood} onSelect={setMood} onClear={clearMood} onClose={()=>setMoodPickerDay(null)} />}
                  </div>
                );
              })}
            </div>
          </div>
        )}
      </div>
    );
  }

  return (
    <div style={{ padding:"20px 20px 120px" }}>
      <div style={{ marginBottom:24 }}>
        <div style={{ fontSize:13, color:C.sub, letterSpacing:2, marginBottom:4 }}>月份計畫</div>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-end" }}>
          <div style={{ fontSize:26, fontFamily:"'Noto Serif TC',serif", fontWeight:700, color:C.text }}>{year}</div>
          <SaveDot saving={saving} />
        </div>
      </div>
      <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:10 }}>
        {MONTHS.map((label,i)=>{
          const m=i+1, mData=yearData[m]||{};
          const hasPlan=mData.plan&&mData.plan.trim();
          const moodCount=Object.values(mData.marked||{}).filter(Boolean).length;
          const isCurrent=m===new Date().getMonth()+1&&year===new Date().getFullYear();
          return (
            <button key={m} onClick={()=>setSelected(m)} style={{ background:isCurrent?C.accentLight:C.card, borderRadius:14, padding:"14px 12px", display:"flex", flexDirection:"column", alignItems:"flex-start", gap:5, border:`1.5px solid ${isCurrent?C.accent+"50":C.border}`, cursor:"pointer", textAlign:"left" }}>
              <div style={{ fontSize:15, fontWeight:600, color:isCurrent?C.accent:C.text }}>{label}</div>
              {hasPlan&&<div style={{ fontSize:10, color:C.sub }}>📋 有計畫</div>}
              {moodCount>0&&<div style={{ fontSize:10, color:C.sub }}>😊 {moodCount} 天</div>}
              {!hasPlan&&moodCount===0&&<div style={{ fontSize:10, color:C.border }}>— 空白</div>}
            </button>
          );
        })}
      </div>
    </div>
  );
}

// ── Daily Note ─────────────────────────────────────────────
function DailyNote({ dailyData, setDailyData, saving }) {
  const today = new Date().toISOString().slice(0,10);
  const [date, setDate] = useState(today);
  const note = dailyData[date]||"";
  const dateLabel = new Date(date+"T00:00:00").toLocaleDateString("zh-TW",{month:"long",day:"numeric",weekday:"long"});
  return (
    <div style={{ padding:"20px 20px 120px" }}>
      <div style={{ marginBottom:16 }}>
        <div style={{ fontSize:13, color:C.sub, letterSpacing:2, marginBottom:4 }}>當日記錄</div>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", gap:8 }}>
          <div style={{ fontSize:16, fontFamily:"'Noto Serif TC',serif", fontWeight:700, color:C.text, flex:1, minWidth:0 }}>{dateLabel}</div>
          <SaveDot saving={saving} />
        </div>
      </div>
      <input type="date" value={date} onChange={e=>setDate(e.target.value)}
        style={{ width:"100%", maxWidth:"100%", border:`1.5px solid ${C.border}`, borderRadius:12, padding:"11px 14px", fontSize:14, color:C.text, background:C.card, outline:"none", marginBottom:16, display:"block", WebkitAppearance:"none", appearance:"none" }} />
      {!note&&<div style={{ textAlign:"center", padding:"20px 0 12px", color:C.sub, fontSize:14 }}>這天還沒有記錄</div>}
      <textarea style={{ width:"100%", minHeight:260, border:`1.5px solid ${C.border}`, borderRadius:14, padding:16, fontSize:15, lineHeight:1.8, color:C.text, background:C.card, resize:"none", outline:"none", display:"block" }}
        value={note} onChange={e=>setDailyData(p=>({...p,[date]:e.target.value}))} placeholder="今天發生了什麼事…" />
      {note&&<button onClick={()=>setDailyData(p=>({...p,[date]:""}))} style={{ marginTop:10, background:"none", border:`1px solid ${C.red}`, color:C.red, borderRadius:8, padding:"7px 14px", cursor:"pointer", fontSize:13 }}>清除</button>}
    </div>
  );
}

// ── Settings ───────────────────────────────────────────────
function SettingsModal({ user, password, plannerName, setPlannerName, onClose, onLogout }) {
  const [name, setName] = useState(plannerName);
  const [nickname, setNickname] = useState("");
  const [msg, setMsg] = useState("");
  const [saving, setSaving] = useState(false);

  function savePlannerName() {
    const val=name.trim()||"計畫本";
    setPlannerName(val); localStorage.setItem("plannerName_"+user,val);
    setMsg("已儲存！"); setTimeout(()=>setMsg(""),2000);
  }
  async function saveNickname() {
    if (!nickname.trim()) return;
    setSaving(true);
    const res = await apiPost({action:"updateName",user,password,displayName:nickname.trim()});
    setSaving(false);
    if (res&&res.ok) { setMsg("暱稱已更新！"); setTimeout(()=>setMsg(""),2000); }
    else setMsg("更新失敗");
  }

  return (
    <div className="fade-in" style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.3)", zIndex:100, display:"flex", alignItems:"flex-end" }}>
      <div style={{ width:"100%", maxWidth:430, margin:"0 auto", background:C.card, borderRadius:"20px 20px 0 0", padding:"24px 20px 48px" }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:24 }}>
          <div style={{ fontSize:18, fontWeight:700, color:C.text }}>設定</div>
          <button onClick={onClose} style={{ background:C.border, border:"none", borderRadius:10, width:32, height:32, cursor:"pointer", fontSize:16 }}>✕</button>
        </div>
        <div style={{ display:"flex", flexDirection:"column", gap:18 }}>
          <div>
            <div style={{ fontSize:12, color:C.sub, marginBottom:7 }}>計畫本名稱</div>
            <div style={{ display:"flex", gap:8 }}>
              <input value={name} onChange={e=>setName(e.target.value)} style={{ flex:1, border:`1.5px solid ${C.border}`, borderRadius:10, padding:"9px 10px", fontSize:14, color:C.text, background:C.bg, outline:"none", minWidth:0 }} />
              <button onClick={savePlannerName} style={{ background:C.accent, color:"#fff", border:"none", borderRadius:10, padding:"9px 12px", cursor:"pointer", fontSize:13, fontWeight:600, flexShrink:0 }}>儲存</button>
            </div>
          </div>
          <div>
            <div style={{ fontSize:12, color:C.sub, marginBottom:7 }}>更新暱稱</div>
            <div style={{ display:"flex", gap:8 }}>
              <input value={nickname} onChange={e=>setNickname(e.target.value)} placeholder="輸入新暱稱" style={{ flex:1, border:`1.5px solid ${C.border}`, borderRadius:10, padding:"9px 10px", fontSize:14, color:C.text, background:C.bg, outline:"none", minWidth:0 }} />
              <button onClick={saveNickname} disabled={saving} style={{ background:C.accent, color:"#fff", border:"none", borderRadius:10, padding:"9px 12px", cursor:"pointer", fontSize:13, fontWeight:600, flexShrink:0, opacity:saving?0.7:1 }}>更新</button>
            </div>
          </div>
          {msg&&<div style={{ fontSize:13, color:C.accent, textAlign:"center" }}>{msg}</div>}
          <button onClick={onLogout} style={{ width:"100%", padding:"12px 0", borderRadius:12, border:`1.5px solid ${C.red}`, background:"none", color:C.red, fontSize:15, fontWeight:600, cursor:"pointer" }}>登出</button>
        </div>
      </div>
    </div>
  );
}

// ── Main App ───────────────────────────────────────────────
const TABS = [
  { id:"goals", label:"年度目標", icon:<svg width="20" height="20" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="8" stroke="currentColor" strokeWidth="1.6"/><circle cx="10" cy="10" r="4" stroke="currentColor" strokeWidth="1.6"/><circle cx="10" cy="10" r="1.5" fill="currentColor"/></svg> },
  { id:"month", label:"月份計畫", icon:<svg width="20" height="20" viewBox="0 0 20 20" fill="none"><rect x="3" y="4" width="14" height="13" rx="2" stroke="currentColor" strokeWidth="1.6"/><path d="M7 2v4M13 2v4M3 9h14" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round"/></svg> },
  { id:"daily", label:"當日記錄", icon:<svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M4 6h12M4 10h8M4 14h5" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round"/></svg> },
];

function MainApp({ user, password, displayName:initName }) {
  const thisYear = new Date().getFullYear();
  const [year, setYear] = useState(thisYear);
  const [tab, setTab] = useState(0);
  const [goals, setGoalsState] = useState({});       // { [year]: [{text,done,doneDate}] }
  const [monthData, setMonthState] = useState({});   // { [year]: { [month]: {mode,plan,marked} } }
  const [dailyData, setDailyState] = useState({});   // { [date]: text }
  const [loading, setLoading] = useState(true);
  const [saving, setSaving] = useState({goals:false,month:false,daily:false});
  const [showSettings, setShowSettings] = useState(false);
  const [plannerName, setPlannerName] = useState(localStorage.getItem("plannerName_"+user)||"計畫本");
  const timers = {goals:useRef(null),month:useRef(null),daily:useRef(null)};
  const touchStart = useRef(null);

  useEffect(()=>{
    async function load() {
      setLoading(true);
      const [g,m,d] = await Promise.all([
        readSheetJson(user,"goals"),
        readSheetJson(user,"month"),
        readSheetJson(user,"daily"),
      ]);
      if (g) setGoalsState(g);
      if (m) setMonthState(m);
      if (d) setDailyState(d);
      setLoading(false);
    }
    load();
  },[]);

  const latestGoals = useRef(goals);
  const latestMonth = useRef(monthData);
  const latestDaily = useRef(dailyData);

  function makeSet(key, stateSetter, latestRef, sheetKey) {
    return (updater) => {
      const prev = latestRef.current;
      const next = typeof updater === 'function' ? updater(prev) : updater;
      latestRef.current = next;
      stateSetter(next);
      setSaving(p=>({...p,[key]:true}));
      clearTimeout(timers[key].current);
      timers[key].current = setTimeout(async()=>{
        console.log("saving " + sheetKey + ":", JSON.stringify(latestRef.current).slice(0,80));
        await writeSheetJson(user, sheetKey, latestRef.current);
        setSaving(p=>({...p,[key]:false}));
      }, 1500);
    };
  }

  const setGoals = makeSet("goals", setGoalsState, latestGoals, "goals");
  const setMonthData = makeSet("month", setMonthState, latestMonth, "month");
  const setDailyData = makeSet("daily", setDailyState, latestDaily, "daily");

  function updateMonth(year, m, val) {
    const prev = latestMonth.current;
    const yearObj = prev[year] ? { ...prev[year] } : {};
    yearObj[m] = val;
    const next = { ...prev, [year]: yearObj };
    setMonthData(next);
  }

  const handleTouchStart=e=>{touchStart.current=e.touches[0].clientX;};
  const handleTouchEnd=e=>{
    if(!touchStart.current) return;
    const diff=touchStart.current-e.changedTouches[0].clientX;
    if(Math.abs(diff)>50){ if(diff>0&&tab<2) setTab(t=>t+1); if(diff<0&&tab>0) setTab(t=>t-1); }
    touchStart.current=null;
  };
  function handleLogout(){ localStorage.removeItem("session"); window.location.reload(); }
  const yearOptions=Array.from({length:11},(_,i)=>thisYear-2+i);

  if (loading) return (
    <div style={{ height:"100vh", display:"flex", alignItems:"center", justifyContent:"center", flexDirection:"column", gap:16, background:C.bg }}>
      <div style={{ width:36, height:36, borderRadius:18, border:`3px solid ${C.border}`, borderTopColor:C.accent, animation:"spin 0.8s linear infinite" }} />
      <div style={{ color:C.sub, fontSize:14 }}>載入 {initName} 的資料…</div>
    </div>
  );

  return (
    <div style={{ height:"100vh", display:"flex", flexDirection:"column", background:C.bg, maxWidth:430, margin:"0 auto", position:"relative", overflow:"hidden" }}>
      <div style={{ padding:"52px 20px 14px", background:C.bg, flexShrink:0, borderBottom:`1px solid ${C.border}` }}>
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between" }}>
          <button onClick={()=>setShowSettings(true)} style={{ background:"none", border:"none", cursor:"pointer", textAlign:"left", padding:0 }}>
            <div style={{ fontSize:20, fontFamily:"'Noto Serif TC',serif", fontWeight:700, color:C.text }}>{plannerName}</div>
            <div style={{ fontSize:12, color:C.sub, marginTop:2 }}>{initName} ✎</div>
          </button>
          <select value={year} onChange={e=>setYear(Number(e.target.value))} style={{ border:`1.5px solid ${C.border}`, borderRadius:10, padding:"6px 10px", fontSize:14, color:C.text, background:C.card, outline:"none", cursor:"pointer" }}>
            {yearOptions.map(y=><option key={y} value={y}>{y} 年</option>)}
          </select>
        </div>
      </div>

      <div style={{ flex:1, overflow:"hidden" }} onTouchStart={handleTouchStart} onTouchEnd={handleTouchEnd}>
        <div className="swipe-container" style={{ transform:`translateX(${-tab*33.333}%)` }}>
          <div className="swipe-panel"><YearGoals goals={goals} setGoals={setGoals} saving={saving.goals} year={year} /></div>
          <div className="swipe-panel"><MonthPlanner monthData={monthData} updateMonth={(m,v)=>updateMonth(year,m,v)} saving={saving.month} year={year} /></div>
          <div className="swipe-panel"><DailyNote dailyData={dailyData} setDailyData={setDailyData} saving={saving.daily} /></div>
        </div>
      </div>

      <div style={{ background:"rgba(247,245,242,0.95)", backdropFilter:"blur(16px)", borderTop:`1px solid ${C.border}`, display:"flex", padding:"10px 0 28px", flexShrink:0 }}>
        {TABS.map((t,i)=>(
          <button key={t.id} onClick={()=>setTab(i)} style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", gap:4, background:"none", border:"none", cursor:"pointer", padding:"4px 0", color:tab===i?C.accent:C.sub, transition:"color 0.2s" }}>
            {t.icon}
            <div style={{ fontSize:10, fontWeight:tab===i?600:400 }}>{t.label}</div>
          </button>
        ))}
      </div>

      {showSettings&&(
        <SettingsModal user={user} password={password} plannerName={plannerName} setPlannerName={setPlannerName}
          onClose={()=>setShowSettings(false)} onLogout={handleLogout} />
      )}
    </div>
  );
}

function Root() {
  const [session, setSession] = useState(()=>{ try { return JSON.parse(localStorage.getItem("session")); } catch { return null; } });
  function handleLogin(user,password,displayName) {
    const s={user,password,displayName};
    localStorage.setItem("session",JSON.stringify(s));
    setSession(s);
  }
  if (!session) return <CoverPage onLogin={handleLogin} />;
  return <MainApp user={session.user} password={session.password} displayName={session.displayName} />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<Root />);
</script>
</body>
</html>
